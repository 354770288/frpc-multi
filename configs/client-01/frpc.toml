# Copy this file to the VPS and replace every CHANGE_ME value before starting.
serverAddr = "CHANGE_ME_FRPS_HOST"
serverPort = 7000

[auth]
method = "token"
token = "CHANGE_ME_STRONG_TOKEN"

[log]
to = "console"
level = "info"
maxDays = 3

[[proxies]]
name = "client-01-ssh"
type = "tcp"
localIP = "host.docker.internal"
localPort = 22
remotePort = 6001

