name: frpc-multi-agent

# Agent 执行端：主动出站连回主控 Console（ws/wss），不监听任何入站管理端口。
# 因此 NAT / 无公网的机器也能被纳管，只要能出站访问主控即可。
# 这些变量通常由 Console 生成的一键安装命令注入；手动部署时在 .env 里填写。
services:
  frpc-agent:
    # 默认拉取 GHCR 发布的镜像（目标机无需源码）。开发时本地构建用：
    #   docker compose -f compose.agent.yaml up -d --build
    image: ${AGENT_IMAGE:-ghcr.io/354770288/frpc-multi:latest}
    build:
      context: ./webui
    container_name: frpc-agent
    restart: unless-stopped
    environment:
      # docker-out-of-docker：Agent 经宿主 docker.sock 创建 frpc 容器，frpc 的配置 bind mount
      # 由【宿主机】文件系统解析。因此 PROJECT_DIR 必须等于下方挂载的【宿主】路径（AGENT_DATA_DIR），
      # 做到"宿主路径 = 容器内路径"，否则宿主 docker 找不到 instances/<name>/frpc.toml 会建空目录，
      # frpc 报 "read /etc/frp/frpc.toml: is a directory"。
      PROJECT_DIR: ${AGENT_DATA_DIR:-/opt/frpc-multi}
      FRPC_MULTI_ROLE: agent
      # 主控可达地址 host:port（与一键安装命令一致）。
      AGENT_SERVER: ${AGENT_SERVER:?set AGENT_SERVER (console host:port) before starting the agent}
      # 节点身份，由 Console 新建节点时生成。
      AGENT_UUID: ${AGENT_UUID:?set AGENT_UUID from the console node}
      # 出站鉴权密钥，由 Console 新建节点时生成。
      AGENT_SECRET: ${AGENT_SECRET:?set AGENT_SECRET from the console node}
      # 主控在 TLS 反代后时设为 true（使用 wss）。
      AGENT_TLS: ${AGENT_TLS:-false}
      FRP_IMAGE: ${FRP_IMAGE:-ghcr.io/fatedier/frpc:v0.68.1}
      FRPC_MEMORY_LIMIT: ${FRPC_MEMORY_LIMIT:-128m}
      FRPC_CPU_LIMIT: ${FRPC_CPU_LIMIT:-0.25}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # 宿主路径 = 容器内路径（见上方 PROJECT_DIR 说明）。AGENT_DATA_DIR 默认 /opt/frpc-multi。
      - ${AGENT_DATA_DIR:-/opt/frpc-multi}:${AGENT_DATA_DIR:-/opt/frpc-multi}
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frpc-agent

networks:
  frpc-agent:
    driver: bridge
