name: frpc-multi

services:
  frpc-webui:
    build:
      context: ./webui
    container_name: frpc-webui
    restart: unless-stopped
    environment:
      PROJECT_DIR: /opt/frpc-multi
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8081
      WEBUI_USERNAME: ${WEBUI_USERNAME:-admin}
      WEBUI_PASSWORD: ${WEBUI_PASSWORD:-change-this-password}
      DATABASE_PATH: ${DATABASE_PATH:-/data/console.db}
      FRPC_MULTI_ROLE: ${FRPC_MULTI_ROLE:-all}
      AGENT_AUTH_ENABLED: ${AGENT_AUTH_ENABLED:-false}
      AGENT_TOKEN: ${AGENT_TOKEN:-}
    ports:
      - "${WEBUI_HOST:-127.0.0.1}:${WEBUI_PORT:-8081}:8081"
    volumes:
      - console-data:/data
      - ./:/opt/frpc-multi
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frpc-outbound

volumes:
  console-data:
    name: ${CONSOLE_DATA_VOLUME:-frpc-multi-console_console-data}

networks:
  frpc-outbound:
    driver: bridge
