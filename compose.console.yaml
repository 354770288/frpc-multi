name: frpc-multi-console

services:
  frpc-console:
    build:
      context: ./webui
    container_name: frpc-console
    restart: unless-stopped
    environment:
      PROJECT_DIR: /opt/frpc-multi
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8081
      WEBUI_USERNAME: ${WEBUI_USERNAME:-admin}
      WEBUI_PASSWORD: ${WEBUI_PASSWORD:-change-this-password}
      WEBUI_JWT_SECRET: ${WEBUI_JWT_SECRET:-}
      DATABASE_PATH: ${DATABASE_PATH:-/data/console.db}
      FRPC_MULTI_ROLE: console
    ports:
      - "${CONSOLE_HOST:-127.0.0.1}:${CONSOLE_PORT:-8081}:8081"
    volumes:
      - console-data:/data
      - ./.webui:/opt/frpc-multi/.webui
    networks:
      - frpc-control

volumes:
  console-data:
    name: ${CONSOLE_DATA_VOLUME:-frpc-multi-console_console-data}

networks:
  frpc-control:
    driver: bridge
